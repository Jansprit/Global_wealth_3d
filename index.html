<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global GDP (PPP) per Capita 3D Visualization</title>
    
    <!-- 引入字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- 引入需要的外部函式庫 (鎖定穩定版本避免報錯) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.136.0/build/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.32.1/dist/globe.gl.min.js"></script>
    <script src="https://unpkg.com/d3@7.8.5/dist/d3.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Noto Sans TC', sans-serif;
            color: #fff;
        }

        #globeViz {
            width: 100vw;
            height: 100vh;
        }

        /* 標題介面 */
        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }
        
        .header h1 {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
        }

        .header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #aaa;
        }

        /* Hover Tooltip */
        .tooltip {
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            transition: all 0.1s ease;
        }

        .tooltip .country-name {
            font-weight: bold;
            font-size: 16px;
            color: #4da6ff;
            margin-bottom: 5px;
        }

        .tooltip .gdp-value {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
        }

        /* 資訊面板 (點擊後顯示) */
        #infoPanel {
            position: absolute;
            top: 50%;
            right: -400px;
            transform: translateY(-50%);
            width: 260px;
            background: rgba(15, 20, 35, 0.7);
            border-left: 3px solid #fff;
            backdrop-filter: blur(10px);
            padding: 20px;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.5);
            transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            border-radius: 12px 0 0 12px;
        }

        #infoPanel.active {
            right: 0;
        }

        #infoPanel h2 {
            margin-top: 0;
            font-size: 22px;
            margin-bottom: 5px;
            color: #fff;
        }

        #panelZhName {
            color: #ffffff;
            text-decoration: none;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        #panelZhName:hover {
            color: #4da6ff;
            text-shadow: 0 0 10px rgba(77, 166, 255, 0.6);
            text-decoration: none;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        #panelFlag {
            width: 56px;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            display: none;
        }

        #infoPanel .en-name {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 0px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #infoPanel .stat-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        #infoPanel .stat-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 5px;
        }

        #infoPanel .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: bold;
            color: #4da6ff;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
            color: #888;
            font-size: 20px;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #fff;
        }

        /* 圖例 (Legend) */
        .legend {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 15, 30, 0.8);
            backdrop-filter: blur(5px);
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .legend-title {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .legend-bar-container {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .legend-bar {
            width: 300px;
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(to right, #00008B, #FFFFFF, #8B0000);
        }
        
        .legend-marker {
            position: absolute;
            top: -4px;
            left: 0%;
            height: 20px;
            width: 4px;
            background: #00ffff;
            box-shadow: 0 0 8px #00ffff, 0 0 15px #00ffff;
            border-radius: 2px;
            transform: translateX(-50%);
            transition: left 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        .legend-marker.active {
            opacity: 1;
        }

        .legend-labels {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            color: #ddd;
        }

        /* 載入動畫 */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            color: #fff;
            transition: opacity 1s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 手機版響應式設計 */
        @media (max-width: 768px) {
            .header h1 { font-size: 18px; }
            .header p { font-size: 12px; }

            .legend {
                bottom: auto;
                top: 80px;
                transform: translateX(-50%) scale(0.85);
                padding: 10px 20px;
            }

            #infoPanel {
                top: auto;
                bottom: -100%;
                right: 50%;
                transform: translateX(50%);
                width: 90vw;
                max-width: none;
                border-left: none;
                border-top: 3px solid #fff;
                border-radius: 16px 16px 0 0;
                padding: 15px 20px;
                transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            }

            #infoPanel.active {
                bottom: 0;
            }

            #infoPanel h2 { font-size: 20px; }
            #panelFlag { width: 45px; }
            .panel-header { margin-bottom: 10px; }
            #infoPanel .stat-box { padding: 10px; margin-bottom: 10px; }
            #infoPanel .stat-value { font-size: 18px; }
            #infoPanel .en-name { font-size: 12px; }
        }
    </style>
</head>
<body>

    <!-- 載入畫面 -->
    <div id="loader">
        <div class="spinner"></div>
        <div id="loadingText">Fetching real-time World Bank Data...</div>
    </div>

    <!-- 標題 -->
    <div class="header">
        <h1>GLOBAL WEALTH 3D</h1>
        <p>購買力平價人均 GDP (World Bank 最新指標)</p>
    </div>

    <!-- 3D 地球容器 -->
    <div id="globeViz"></div>

    <!-- 圖例 -->
    <div class="legend">
        <div class="legend-title">GDP (PPP) PER CAPITA - LOG SCALE</div>
        <div class="legend-bar-container">
            <div class="legend-bar"></div>
            <div id="legendMarker" class="legend-marker"></div>
        </div>
        <div class="legend-labels">
            <span><$1K</span>
            <span>$12K</span>
            <span>>$150K</span>
        </div>
    </div>

    <!-- 資訊面板 -->
    <div id="infoPanel">
        <span class="close-btn" onclick="closePanel()">✕</span>
        
        <div class="panel-header">
            <img id="panelFlag" src="" alt="National Flag">
            <div>
                <h2><a id="panelZhName" href="#" target="_blank" rel="noopener noreferrer" title="前往維基百科查看">國家名稱</a></h2>
                <div id="panelEnName" class="en-name">Country Name</div>
            </div>
        </div>
        
        <div class="stat-box">
            <div class="stat-label">GDP (PPP) PER CAPITA (USD)</div>
            <div id="panelGdp" class="stat-value">$ 0</div>
        </div>
        
        <div class="stat-box">
            <div class="stat-label">全球財富評級</div>
            <div id="panelLevel" class="stat-value" style="font-size: 18px; color: #fff;">-</div>
        </div>
    </div>

            "QAT": "卡達", "ROU": "羅馬尼亞", "RUS": "俄羅斯", "RWA": "盧安達", 
            "SAU": "沙烏地阿拉伯", "SDN": "蘇丹", "SSD": "南蘇丹", "SEN": "塞內加爾", "SLB": "索羅門群島",
            "SLE": "獅子山", "SLV": "薩爾瓦多", "SOM": "索馬利亞", "SRB": "塞爾維亞", "SUR": "蘇利南",

            "TLS": "東帝汶", "TTO": "千里達及托巴哥", "TUN": "突尼西亞", "TUR": "土耳其", "TWN": "台灣",
            "TZA": "坦尚尼亞", "UGA": "烏干達", "UKR": "烏克蘭", "URY": "烏拉圭", "USA": "美國",

            "KOS": "科索沃", "PSX": "巴勒斯坦", "SOL": "索馬利蘭", "SAH": "西撒哈拉", "CYN": "北賽普勒斯"
        };

        // 全球 ISO_A3 轉 ISO_A2 (用於讀取 flagcdn.com 上的國旗圖片)

            "AFG": "af", "AGO": "ao", "ALB": "al", "ARE": "ae", "ARG": "ar", "ARM": "am", "ATA": "aq", "ATF": "tf", "AUS": "au", "AUT": "at",

            "KOS": "xk", "PSX": "ps", "SAH": "eh"
        };

        // PPP 數據整體較高，重新調整對數顏色比例尺的邊界值
        const MIN_GDP = 700;    // 最低如蒲隆地等國
        const MID_GDP = 12000;  // 中間值
        const MAX_GDP = 150000; // 最高如盧森堡、新加坡等國

        const colorScale = d3.scaleLog()
            .domain([MIN_GDP, MID_GDP, MAX_GDP])
            .range(['#00008B', '#FFFFFF', '#8B0000'])
            .clamp(true);

        const positionScale = d3.scaleLog()
            .domain([MIN_GDP, MAX_GDP])
            .range([0, 100])
            .clamp(true);

        const formatMoney = d3.format(",.0f");

        // 初始化 Globe.gl
        const globe = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg') 
            .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png') 
            .backgroundColor('#050510')
            .showAtmosphere(true) 
            .atmosphereColor('#183f70')
            .atmosphereAltitude(0.15)
            .lineHoverPrecision(0)
            .polygonsData([])
            .polygonAltitude(0.01)
            .polygonCapColor(d => colorScale(d.properties.gdpData.gdp))
            .polygonSideColor(() => 'rgba(0,0,0,0.2)')
            .polygonStrokeColor(() => '#111')
            
            // Hover 效果
            .polygonLabel(({ properties: d }) => `
                <div class="tooltip">
                    <div class="country-name">${d.gdpData.zh} (${d.ADMIN})</div>
                    <div class="gdp-value">GDP (PPP): $${formatMoney(d.gdpData.gdp)}</div>
                </div>
            `)
            .onPolygonHover(hoverD => {
                globe
                    .polygonAltitude(d => d === hoverD ? 0.06 : 0.01)
                    .polygonCapColor(d => {
                        const baseColor = colorScale(d.properties.gdpData.gdp);
                        return d === hoverD ? d3.color(baseColor).brighter(0.5).formatHex() : baseColor;
                    });
            })
            
            // 點擊事件：視角聚焦並顯示面板
            .onPolygonClick(d => {
                const centroid = d3.geoCentroid(d);
                const lng = centroid[0];
                const lat = centroid[1];
                const isMobile = window.innerWidth <= 768;
                
                const offsetLng = isMobile ? lng : lng + 15;
                const offsetLat = isMobile ? lat - 15 : lat;

                globe.pointOfView({ lat: offsetLat, lng: offsetLng, altitude: 1.2 }, 1000);
                updatePanel(d.properties);
                globe.controls().autoRotate = false;
            });

        globe.controls().autoRotate = true;
        globe.controls().autoRotateSpeed = 1.2;
        globe.controls().enableDamping = true;

        const globeMaterial = globe.globeMaterial();
        globeMaterial.color = new THREE.Color('#ffffff');
        globeMaterial.emissive = new THREE.Color('#0a305e');
        globeMaterial.emissiveIntensity = 1.0; 

        // -------------------------------------------------------------------
        // 動態載入：同時並行請求 GeoJSON 國界資料 與 世界銀行 API 數據
        // World Bank API 指標：NY.GDP.PCAP.PP.CD (GDP per capita, PPP (current international $))
        // -------------------------------------------------------------------
        Promise.all([
            fetch('https://raw.githubusercontent.com/vasturiano/globe.gl/master/example/datasets/ne_110m_admin_0_countries.geojson').then(res => res.json()),
            fetch('https://api.worldbank.org/v2/country/all/indicator/NY.GDP.PCAP.PP.CD?format=json&per_page=400&mrnev=1').then(res => res.json())
        ])
        .then(([countriesGeoJSON, wbData]) => {
            
            // 建立真實數據映射表 (Mapping)
            const gdpMap = {};
            if (wbData && wbData[1]) {
                wbData[1].forEach(item => {
                    if (item.countryiso3code && item.value !== null) {
                        // 【關鍵修復】：解決世界銀行與 Natural Earth 圖資 ISO 代碼不匹配的問題
                        let wbIso = item.countryiso3code;
                        if (wbIso === 'XKX') wbIso = 'KOS'; // 科索沃
                        if (wbIso === 'PSE') wbIso = 'PSX'; // 巴勒斯坦
                        
                        gdpMap[wbIso] = item.value;
                    }
                });
            }

            // 【特別校正】：為世界銀行 API 中缺失的國家，手動補充 Wikipedia/IMF/CIA 近期 PPP 概估值
            // 使用雙重保險判斷：如果世銀有給值就不覆蓋，若無則注入考證過的保底值
            
            if (!gdpMap['TWN']) gdpMap['TWN'] = 76858; // 台灣 (IMF 2024 概估)
            if (!gdpMap['KOS']) gdpMap['KOS'] = 13964; // 科索沃 (Wiki 2022 估計)
            if (!gdpMap['PSX']) gdpMap['PSX'] = 5664;  // 巴勒斯坦 (IMF 近期估計)
            if (!gdpMap['PRK']) gdpMap['PRK'] = 1800;  // 北韓 (CIA 概估)
            if (!gdpMap['CUB']) gdpMap['CUB'] = 12300; // 古巴 (Wiki 估計)
            if (!gdpMap['SYR']) gdpMap['SYR'] = 2900;  // 敘利亞 (CIA 概估)
            if (!gdpMap['VEN']) gdpMap['VEN'] = 7985;  // 委內瑞拉 (IMF 2024 概估)
            if (!gdpMap['ERI']) gdpMap['ERI'] = 1629;  // 厄利垂亞 (IMF 2024 概估)
            if (!gdpMap['YEM']) gdpMap['YEM'] = 1996;  // 葉門 (IMF 2024 概估)
            if (!gdpMap['SOM']) gdpMap['SOM'] = 1374;  // 索馬利亞 (IMF 2024 概估)
            if (!gdpMap['SOL']) gdpMap['SOL'] = 1000;  // 索馬利蘭 (與索馬利亞相近概估)
            if (!gdpMap['SAH']) gdpMap['SAH'] = 2500;  // 西撒哈拉 (參考概估)
            if (!gdpMap['GRL']) gdpMap['GRL'] = 54000; // 格陵蘭 (Wiki 估計)
            if (!gdpMap['NCL']) gdpMap['NCL'] = 40000; // 新喀里多尼亞 (Wiki 估計)
            if (!gdpMap['CYN']) gdpMap['CYN'] = 14942; // 北賽普勒斯 (Wiki 估計)

            // 將真實數據整合進 GeoJSON 的屬性中
            countriesGeoJSON.features.forEach(feature => {
                let iso = feature.properties.ISO_A3;
                if (iso === '-99') {
                    iso = feature.properties.ADM0_A3; // 修復法國與挪威的代碼
                }
                const nameEn = feature.properties.ADMIN;
                const zhName = isoA3ToZh[iso] || nameEn;
                
                // 讀取真實數據，若極少數地區完全無資料則保底 800 (維持對數計算不崩潰)
                const gdpValue = gdpMap[iso] || 800; 

                feature.properties.gdpData = {
                    zh: zhName,
                    gdp: gdpValue,
                    iso3: iso
                };
            });

            // 渲染地圖
            globe.polygonsData(countriesGeoJSON.features);

            // 隱藏載入畫面
            setTimeout(() => {
                const loader = document.getElementById('loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 1000);
                }
            }, 500);
        })
        .catch(err => {
            console.error("載入資料失敗:", err);
            const loader = document.getElementById('loader');
            if (loader) loader.innerHTML = "API 請求失敗，請檢查網路連線或 World Bank 伺服器狀態。";
        });

        window.addEventListener('resize', () => {
            globe.width(window.innerWidth);
            globe.height(window.innerHeight);
        });

        // 更新資訊面板與圖例游標
        function updatePanel(props) {
            const data = props.gdpData;
            
            const panelZhNameEl = document.getElementById('panelZhName');
            panelZhNameEl.innerText = data.zh;
            panelZhNameEl.href = `https://zh.wikipedia.org/zh-tw/${encodeURIComponent(data.zh)}`;
            
            document.getElementById('panelEnName').innerText = props.ADMIN;
            
            const flagEl = document.getElementById('panelFlag');
            const iso2 = iso3ToIso2[data.iso3];
            if (iso2) {
                flagEl.src = `https://flagcdn.com/w80/${iso2}.png`;
                flagEl.style.display = 'block';
            } else {
                flagEl.style.display = 'none';
            }
            
            let counter = { val: 0 };
            const targetVal = data.gdp;
            
            d3.select(counter)
              .transition()
              .duration(1000)
              .tween("val", function() {
                const i = d3.interpolate(this.val, targetVal);
                return function(t) {
                  document.getElementById('panelGdp').innerText = '$ ' + formatMoney(i(t));
                };
              });

            // 因應 PPP 整體數值較高，上調評級標準
            const levelEl = document.getElementById('panelLevel');
            if (targetVal < 12000) {
                levelEl.innerText = "發展中區域 (深藍)";
                levelEl.style.color = "#88b3ff";
            } else if (targetVal < 50000) {
                levelEl.innerText = "中高所得 (白/淺紅)";
                levelEl.style.color = "#ffffff";
            } else {
                levelEl.innerText = "高度發達 (深紅)";
                levelEl.style.color = "#ff6666";
            }

            const marker = document.getElementById('legendMarker');
            marker.style.left = positionScale(targetVal) + '%';
            marker.classList.add('active');

            document.getElementById('infoPanel').classList.add('active');
        }

        function closePanel() {
            document.getElementById('infoPanel').classList.remove('active');
            document.getElementById('legendMarker').classList.remove('active');
            globe.controls().autoRotate = true;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- 引入需要的外部函式庫 (鎖定穩定版本避免報錯) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.136.0/build/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.32.1/dist/globe.gl.min.js"></script>
    <script src="https://unpkg.com/d3@7.8.5/dist/d3.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Noto Sans TC', sans-serif;
            color: #fff;
        }

        #globeViz {
            width: 100vw;
            height: 100vh;
        }

        /* 標題介面 */
        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }
        
        .header h1 {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
        }

        .header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #aaa;
        }

        /* Hover Tooltip */
        .tooltip {
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            transition: all 0.1s ease;
        }

        .tooltip .country-name {
            font-weight: bold;
            font-size: 16px;
            color: #4da6ff;
            margin-bottom: 5px;
        }

        .tooltip .gdp-value {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
        }

        /* 資訊面板 (點擊後顯示) */
        #infoPanel {
            position: absolute;
            top: 50%;
            right: -400px; /* 初始隱藏 */
            transform: translateY(-50%);
            width: 260px; /* 【縮小為原本的 ~80%】原為 320px */
            background: rgba(15, 20, 35, 0.7);
            border-left: 3px solid #fff;
            backdrop-filter: blur(10px);
            padding: 20px; /* 【等比縮小】原為 25px */
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.5);
            transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            border-radius: 12px 0 0 12px;
        }

        #infoPanel.active {
            right: 0;
        }

        #infoPanel h2 {
            margin-top: 0;
            font-size: 22px; /* 【縮小為原本的 ~80%】原為 28px */
            margin-bottom: 5px;
            color: #fff;
        }

        /* 新增：國家名稱超連結樣式 */
        #panelZhName {
            color: #ffffff;
            text-decoration: none;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        #panelZhName:hover {
            color: #4da6ff;
            text-shadow: 0 0 10px rgba(77, 166, 255, 0.6); /* 增加科技發光感 */
            text-decoration: none;
        }

        /* 新增：面板頭部排版，利用 flexbox 將國旗與文字並排 */
        .panel-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        /* 新增：國旗圖片樣式 */
        #panelFlag {
            width: 56px;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            display: none; /* 預設隱藏，有讀取到對應國旗才顯示 */
        }

        #infoPanel .en-name {
            font-size: 13px; /* 原為 16px */
            color: #aaa;
            margin-bottom: 0px; /* 原為 15px，現由 panel-header 統一控制底部間距 */
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #infoPanel .stat-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px; /* 原為 15px */
            border-radius: 8px;
            margin-bottom: 12px; /* 原為 15px */
        }

        #infoPanel .stat-label {
            font-size: 11px; /* 原為 12px */
            color: #888;
            margin-bottom: 5px;
        }

        #infoPanel .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px; /* 【縮小為原本的 ~80%】原為 24px */
            font-weight: bold;
            color: #4da6ff;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
            color: #888;
            font-size: 20px;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #fff;
        }

        /* 圖例 (Legend) */
        .legend {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 15, 30, 0.8);
            backdrop-filter: blur(5px);
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .legend-title {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .legend-bar-container {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative; /* 供游標定位使用 */
        }

        .legend-bar {
            width: 300px;
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(to right, #00008B, #FFFFFF, #8B0000);
        }
        
        /* 財富刻度游標標記 */
        .legend-marker {
            position: absolute;
            top: -4px;
            left: 0%;
            height: 20px;
            width: 4px;
            background: #00ffff;
            box-shadow: 0 0 8px #00ffff, 0 0 15px #00ffff;
            border-radius: 2px;
            transform: translateX(-50%);
            transition: left 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        .legend-marker.active {
            opacity: 1;
        }

        .legend-labels {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            color: #ddd;
        }

        /* 載入動畫 */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            color: #fff;
            transition: opacity 1s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ------------------------------------------- */
        /* 新增：手機版響應式設計 (Mobile Responsive) */
        /* ------------------------------------------- */
        @media (max-width: 768px) {
            /* 縮小標題 */
            .header h1 { font-size: 18px; }
            .header p { font-size: 12px; }

            /* 將圖例稍微縮小並往上移，避免被底部面板擋住 */
            .legend {
                bottom: auto;
                top: 80px;
                transform: translateX(-50%) scale(0.85);
                padding: 10px 20px;
            }

            /* 將資訊面板改為「底部抽屜 (Bottom Sheet)」設計 */
            #infoPanel {
                top: auto;
                bottom: -100%; /* 初始隱藏於畫面下方 */
                right: 50%;
                transform: translateX(50%);
                width: 90vw; /* 佔據大部分螢幕寬度 */
                max-width: none;
                border-left: none;
                border-top: 3px solid #fff; /* 頂部邊框亮光 */
                border-radius: 16px 16px 0 0; /* 只有上方圓角 */
                padding: 15px 20px;
                transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            }

            #infoPanel.active {
                bottom: 0; /* 從下方滑出並貼齊底部 */
            }

            /* 縮小面板內的數值字體與間距，以適應手機螢幕 */
            #infoPanel h2 { font-size: 20px; }
            #panelFlag { width: 45px; }
            .panel-header { margin-bottom: 10px; }
            #infoPanel .stat-box { padding: 10px; margin-bottom: 10px; }
            #infoPanel .stat-value { font-size: 18px; }
            #infoPanel .en-name { font-size: 12px; }
        }
    </style>
</head>

            "HUN": "hu", "IDN": "id", "IND": "in", "IRL": "ie", "IRN": "ir", "IRQ": "iq", "ISL": "is", "ISR": "il", "ITA": "it", "JAM": "jm",
            "JOR": "jo", "JPN": "jp", "KAZ": "kz", "KEN": "ke", "KGZ": "kg", "KHM": "kh", "KOR": "kr", "KWT": "kw", "LAO": "la", "LBN": "lb",
            "LBR": "lr", "LBY": "ly", "LKA": "lk", "LSO": "ls", "LTU": "lt", "LUX": "lu", "LVA": "lv", "MAR": "ma", "MDA": "md", "MDG": "mg",
            "MEX": "mx", "MKD": "mk", "MLI": "ml", "MMR": "mm", "MNE": "me", "MNG": "mn", "MOZ": "mz", "MRT": "mr", "MWI": "mw", "MYS": "my",
            "NAM": "na", "NCL": "nc", "NER": "ne", "NGA": "ng", "NIC": "ni", "NLD": "nl", "NOR": "no", "NPL": "np", "NZL": "nz", "OMN": "om",
            "PAK": "pk", "PAN": "pa", "PER": "pe", "PHL": "ph", "PNG": "pg", "POL": "pl", "PRI": "pr", "PRK": "kp", "PRT": "pt", "PRY": "py",
            "QAT": "qa", "ROU": "ro", "RUS": "ru", "RWA": "rw", "ESH": "eh", "SAU": "sa", "SDN": "sd", "SSD": "ss", "SEN": "sn", "SLB": "sb",
            "SLE": "sl", "SLV": "sv", "SOM": "so", "SRB": "rs", "SUR": "sr", "SVK": "sk", "SVN": "si", "SWE": "se", "SWZ": "sz", "SYR": "sy",
            "TCD": "td", "TGO": "tg", "THA": "th", "TJK": "tj", "TKM": "tm", "TLS": "tl", "TTO": "tt", "TUN": "tn", "TUR": "tr", "TWN": "tw",
            "TZA": "tz", "UGA": "ug", "UKR": "ua", "URY": "uy", "USA": "us", "UZB": "uz", "VEN": "ve", "VNM": "vn", "VUT": "vu", "YEM": "ye",
            "ZAF": "za", "ZMB": "zm", "ZWE": "zw"
        };

        // 取得國家資料 (包含回退機制)
        function getCountryData(iso, name_en) {
            let dataObj;
            if (countryDataDict[iso]) {
                dataObj = countryDataDict[iso];
            } else {
                const zhName = isoA3ToZh[iso] || name_en;
                // 雜湊生成一個穩定的隨機 GDP 以供視覺化展示 (避免無資料導致空白)
                let hash = 0;
                for (let i = 0; i < name_en.length; i++) hash = name_en.charCodeAt(i) + ((hash << 5) - hash);
                const pseudoRandom = Math.abs(hash) % 100;
                const fallbackGdp = 800 + (pseudoRandom * 190);
                
                dataObj = { zh: zhName, gdp: fallbackGdp };
            }
            
            // 新增：把修正過的 iso 記錄下來，供後續匹配國旗使用
            return { ...dataObj, iso3: iso }; 
        }

        // 對數顏色比例尺設定
        const MIN_GDP = 300;
        const MID_GDP = 6000;
        const MAX_GDP = 130000;

        const colorScale = d3.scaleLog()
            .domain([MIN_GDP, MID_GDP, MAX_GDP])
            .range(['#00008B', '#FFFFFF', '#8B0000'])
            .clamp(true);

        // 位置比例尺 (計算游標在圖例上的百分比位置 0% ~ 100%)
        const positionScale = d3.scaleLog()
            .domain([MIN_GDP, MAX_GDP])
            .range([0, 100])
            .clamp(true);

        const formatMoney = d3.format(",.0f");

        // 初始化 Globe.gl
        const globe = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg') 
            .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png') 
            .backgroundColor('#050510')
            .showAtmosphere(true) // 開啟大氣層光暈增加真實感
            .atmosphereColor('#183f70') // 【修正】微調大氣層邊緣，配合新的通透洋藍色
            .atmosphereAltitude(0.15)
            .lineHoverPrecision(0)
            .polygonsData([])
            .polygonAltitude(0.01)
            .polygonCapColor(d => colorScale(d.properties.gdpData.gdp))
            .polygonSideColor(() => 'rgba(0,0,0,0.2)')
            .polygonStrokeColor(() => '#111')
            
            // Hover 效果
            .polygonLabel(({ properties: d }) => `
                <div class="tooltip">
                    <div class="country-name">${d.gdpData.zh} (${d.ADMIN})</div>
                    <div class="gdp-value">GDP per capita: $${formatMoney(d.gdpData.gdp)}</div>
                </div>
            `)
            .onPolygonHover(hoverD => {
                globe
                    .polygonAltitude(d => d === hoverD ? 0.06 : 0.01)
                    .polygonCapColor(d => {
                        const baseColor = colorScale(d.properties.gdpData.gdp);
                        return d === hoverD ? d3.color(baseColor).brighter(0.5).formatHex() : baseColor;
                    });
            })
            
            // 點擊事件：視角聚焦並顯示面板
            .onPolygonClick(d => {
                // 取得幾何中心點
                const centroid = d3.geoCentroid(d);
                const lng = centroid[0];
                const lat = centroid[1];

                // 判斷目前是否為手機版螢幕 (寬度 <= 768px)
                const isMobile = window.innerWidth <= 768;

                // 【更好的建議】：智慧視角偏移 (Smart Camera Offset)
                // 電腦版：將攝影機瞄準的經度向東 (右) 偏移約 15 度，讓國家落在畫面左半部。
                // 手機版：將攝影機瞄準的緯度向南 (下) 偏移約 15 度，讓國家落在畫面上半部，避開底部抽屜。
                const offsetLng = isMobile ? lng : lng + 15;
                const offsetLat = isMobile ? lat - 15 : lat;

                // 聚焦動畫 (使用偏移後的座標)
                globe.pointOfView({ lat: offsetLat, lng: offsetLng, altitude: 1.2 }, 1000);
                
                // 更新並顯示右側面板
                updatePanel(d.properties);
                
                // 停止自動旋轉
                globe.controls().autoRotate = false;
            });

        // 設定控制項
        globe.controls().autoRotate = true;
        globe.controls().autoRotateSpeed = 1.2;
        globe.controls().enableDamping = true;

        // 【修正海洋灰暗的問題】：改用 emissive (自發光) 疊加洋藍色
        // 因為 earth-dark.jpg 的海洋極暗，單純改 color (色彩乘法) 會被吸收變成髒灰。
        // 我們把底色重設為白色(保留乾淨的雲層)，並透過 emissive (加法) 讓海洋透出通透的洋藍色。
        const globeMaterial = globe.globeMaterial();
        globeMaterial.color = new THREE.Color('#ffffff'); // 讓雲層維持純白
        globeMaterial.emissive = new THREE.Color('#0a305e'); // 晶瑩剔透的深洋藍色
        globeMaterial.emissiveIntensity = 1.0; 

        // 載入 GeoJSON 資料
        fetch('https://raw.githubusercontent.com/vasturiano/globe.gl/master/example/datasets/ne_110m_admin_0_countries.geojson')
            .then(res => res.json())
            .then(countries => {
                countries.features.forEach(feature => {
                    // 修正：法國與挪威代碼為 -99 的問題
                    let iso = feature.properties.ISO_A3;
                    if (iso === '-99') {
                        iso = feature.properties.ADM0_A3;
                    }
                    const nameEn = feature.properties.ADMIN;
                    
                    const data = getCountryData(iso, nameEn);
                    feature.properties.gdpData = data;
                });

                globe.polygonsData(countries.features);

                // 隱藏載入畫面
                setTimeout(() => {
                    const loader = document.getElementById('loader');
                    if (loader) {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.style.display = 'none', 1000);
                    }
                }, 500);
            })
            .catch(err => {
                console.error("載入資料失敗:", err);
                const loader = document.getElementById('loader');
                if (loader) loader.innerHTML = "資料載入失敗，請檢查網路連線。";
            });

        // 處理視窗縮放
        window.addEventListener('resize', () => {
            globe.width(window.innerWidth);
            globe.height(window.innerHeight);
        });

        // 更新資訊面板與圖例游標
        function updatePanel(props) {
            const data = props.gdpData;
            
            // 更新國家名稱與維基百科超連結 (指定 zh-tw 強制繁體中文介面)
            const panelZhNameEl = document.getElementById('panelZhName');
            panelZhNameEl.innerText = data.zh;
            panelZhNameEl.href = `https://zh.wikipedia.org/zh-tw/${encodeURIComponent(data.zh)}`;
            
            document.getElementById('panelEnName').innerText = props.ADMIN;
            
            // 新增：處理國旗圖片顯示 (使用 flagcdn.com 讀取高品質國旗)
            const flagEl = document.getElementById('panelFlag');
            const iso2 = iso3ToIso2[data.iso3];
            if (iso2) {
                flagEl.src = `https://flagcdn.com/w80/${iso2}.png`;
                flagEl.style.display = 'block';
            } else {
                flagEl.style.display = 'none'; // 若無對應國旗則隱藏圖片框架
            }
            
            let counter = { val: 0 };
            const targetVal = data.gdp;
            
            d3.select(counter)
              .transition()
              .duration(1000)
              .tween("val", function() {
                const i = d3.interpolate(this.val, targetVal);
                return function(t) {
                  document.getElementById('panelGdp').innerText = '$ ' + formatMoney(i(t));
                };
              });

            const levelEl = document.getElementById('panelLevel');
            if (targetVal < MID_GDP) {
                levelEl.innerText = "發展中區域 (深藍)";
                levelEl.style.color = "#88b3ff";
            } else if (targetVal < 40000) {
                levelEl.innerText = "中高所得 (白/淺紅)";
                levelEl.style.color = "#ffffff";
            } else {
                levelEl.innerText = "高度發達 (深紅)";
                levelEl.style.color = "#ff6666";
            }

            // 更新並顯示圖例上的游標標記
            const marker = document.getElementById('legendMarker');
            marker.style.left = positionScale(targetVal) + '%';
            marker.classList.add('active');

            document.getElementById('infoPanel').classList.add('active');
        }

        // 關閉面板
        function closePanel() {
            document.getElementById('infoPanel').classList.remove('active');
            document.getElementById('legendMarker').classList.remove('active');
            globe.controls().autoRotate = true;
        }
    </script>
</body>
</html>
